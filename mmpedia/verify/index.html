<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="referrer" content="no-referrer">
  <title>머미피디아 이메일 인증</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, "Apple SD Gothic Neo",
                   "Noto Sans KR", sans-serif;
      background: linear-gradient(180deg, #F7F7FB 0%, #EEEEF7 100%);
      color: #1C1C1E;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: #FFFFFF;
      padding: 48px 32px 40px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06),
                  0 2px 8px rgba(0, 0, 0, 0.04);
      text-align: center;
    }

    .icon {
      width: 88px;
      height: 88px;
      margin: 0 auto 24px;
      border-radius: 22px;
      background: linear-gradient(135deg, #7B6EF6 0%, #5856D6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(88, 86, 214, 0.25);
    }

    .icon svg {
      width: 44px;
      height: 44px;
      color: #FFFFFF;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 15px;
      line-height: 1.6;
      color: #6E6E73;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px 20px;
      background: #5856D6;
      color: #FFFFFF;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .btn:hover { background: #4A49B8; }
    .btn:active { background: #3F3EA6; }

    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #8E8E93;
      line-height: 1.5;
    }

    .brand {
      margin-top: 40px;
      font-size: 12px;
      color: #AEAEB2;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="main">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>

      <h1 id="title">이메일 인증이 완료되었습니다</h1>
      <p class="subtitle" id="subtitle">
        <span id="subtitleLine1">머미피디아 앱으로 돌아가</span><br>
        <span id="subtitleLine2">로그인을 진행해주세요.</span>
      </p>

      <a href="com.andygile.mmpedia://verify" class="btn" id="openAppBtn">
        앱으로 돌아가기
      </a>

      <p class="hint">
        버튼이 작동하지 않으면<br>
        직접 머미피디아 앱을 열어주세요.
      </p>

      <p class="brand">MMpedia · 머미피디아</p>
    </div>
  </div>

  <script>
    // Hash forwarding for Supabase email links.
    //
    // Supabase sends recovery / signup emails with a link to
    // https://andygile.com/mmpedia/verify/ and appends the recovery /
    // signup payload via ONE of two mechanisms depending on the project's
    // auth flow:
    //
    //   PKCE (Supabase default since 2024):
    //     .../verify/?code=<uuid>
    //   Implicit / legacy hash:
    //     .../verify/#access_token=...&refresh_token=...&type=recovery
    //
    // Either form is forwarded verbatim to the native deep link
    // (com.andygile.mmpedia://verify?code=...  OR  ...://verify#...). The
    // Flutter app's supabase_flutter SDK calls exchangeCodeForSession on
    // PKCE URIs, or restores the implicit session from the hash.
    //
    // When neither a query `code=` nor a hash `access_token=` is present,
    // we keep the static success UX and do not auto-trigger.
    //
    // All DOM writes use textContent so user-provided strings are never
    // interpreted as HTML. The deep link is only used as a string value
    // for href / location.href, which are scheme-validated by the OS.
    (function () {
      var search = window.location.search || '';
      var hash = window.location.hash || '';

      var searchParams = new URLSearchParams(
        search.charAt(0) === '?' ? search.slice(1) : search
      );
      var hashParams = new URLSearchParams(
        hash.charAt(0) === '#' ? hash.slice(1) : hash
      );

      var hasPkceCode = searchParams.has('code');
      var hasAccessToken = hashParams.has('access_token');
      if (!hasPkceCode && !hasAccessToken) {
        return;
      }

      // Type hint — present on hash URIs (`type=recovery|signup`) and on
      // some PKCE flows (Supabase passes it through). Absent → treat as
      // generic "return to app".
      var type = hashParams.get('type') || searchParams.get('type');

      // Preserve the original forwarding payload verbatim. Concatenate
      // query FIRST then hash so both survive when the email link used
      // both simultaneously (rare but defensive).
      var deepLink = 'com.andygile.mmpedia://verify' + search + hash;

      var btn = document.getElementById('openAppBtn');
      if (btn) {
        btn.setAttribute('href', deepLink);
      }

      if (type === 'recovery' || hasPkceCode) {
        // Recovery + the PKCE code path (which lacks `type` on Supabase
        // signup confirms but DOES cover recovery) both benefit from
        // the "자동으로 열립니다" hint.
        var title = document.getElementById('title');
        var line1 = document.getElementById('subtitleLine1');
        var line2 = document.getElementById('subtitleLine2');
        if (title && type === 'recovery') {
          title.textContent = '비밀번호 재설정 페이지로 이동합니다';
        }
        if (line1) line1.textContent = '잠시 후 머미피디아 앱이 자동으로 열립니다.';
        if (line2) line2.textContent = '열리지 않으면 아래 버튼을 눌러주세요.';
      }

      // Auto-trigger the deep link after 500ms so the user has a moment
      // to see the success state before the app launches.
      window.setTimeout(function () {
        window.location.href = deepLink;
      }, 500);
    })();
  </script>
</body>
</html>
